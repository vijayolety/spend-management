services:
  postgres:
    image: postgres:16-alpine
    container_name: spm_postgres
    environment:
      POSTGRES_USER: spm_user
      POSTGRES_PASSWORD: spm_pass
      POSTGRES_DB: spend_management
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spm_user']
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: spm_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      retries: 5

volumes:
  postgres_data:
  redis_data:
